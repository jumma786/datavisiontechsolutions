    { "@type": "HowToStep", "position": 2, "name": "Planning and scheduling", "text": "Agree timing and the sequence of removal so the clearance works around your operations, staging larger jobs over several collections." },
    { "@type": "HowToStep", "position": 3, "name": "Safe disconnection and removal", "text": "Safely isolate and disconnect machinery, then dismantle and remove heavy items with the right equipment, protecting people and the building you are keeping." },

    { "@type": "Question", "name": "How long does a factory clearance take?", "acceptedAnswer": { "@type": "Answer", "text": "It depends on the size of the site and the amount of metal and machinery. A small clearance can be completed in a day, while larger industrial sites are staged over several collections so your operations are not disrupted. We confirm a timescale at the survey stage." } },
    { "@type": "Question", "name": "Do I get paid for a factory clearance?", "acceptedAnswer": { "@type": "Answer", "text": "Yes. Recoverable ferrous and non-ferrous metal is weighed and paid for at agreed grade prices. For most clearances the value of the recovered metal offsets or exceeds the cost of the work, and you receive a clear payment statement based on weighbridge tickets." } },
    { "@type": "Question", "name": "Why does the clearance company need to be a licensed waste carrier?", "acceptedAnswer": { "@type": "Answer", "text": "Under UK duty of care, you can remain legally responsible for where your waste ends up. Using an Environment Agency registered waste carrier and keeping the waste transfer notes is your evidence the material was handled legally. Always ask for and verify the registration number." } },
    { "@type": "Question", "name": "What documentation should I receive after a clearance?", "acceptedAnswer": { "@type": "Answer", "text": "You should receive waste transfer notes recording what was removed and by whom, weighbridge tickets for the material collected, and a payment statement based on those weights and agreed prices." } }
